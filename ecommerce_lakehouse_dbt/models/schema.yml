version: 2

models:
  - name: stg_customers
    description: "Cleaned and deduplicated customer master records."
    columns:
      - name: customer_id
        description: "Primary key for each unique customer."
        tests:
          - unique
          - not_null
      - name: email
        description: "User email address."
        tests:
          - not_null

  - name: generated_customer_first_order
    description: "Intermediate model mapping customer signups to their first order dates."
    columns:
      - name: signup_date
        description: "The date the user created their account."
        tests:
          - not_null
          # fails if account signup happened AFTER the first order date
          - dbt_utils.expression_is_true:
              expression: "<= first_order_date"

  - name: stg_events
    description: "Cleaned clickstream user event logs."
    columns:
      - name: event_id
        description: "Primary key for the user event."
        tests:
          - unique
          - not_null
      - name: session_id
        description: "Foreign key mapping back to the user session."
        tests:
          - not_null
      - name: product_id
        description: "Foreign key mapping to the product item associated with the event."

  - name: stg_orders
    description: "Standardized e-commerce orders."
    columns:
      - name: order_id
        description: "Primary key for the purchase transaction."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key linking the purchase to a specific customer."
        tests:
          - not_null
      - name: ordered_at
        description: "time order was placed."
        tests:
          - not_null
          # checks that order time is not greater than current system clock
          - dbt_utils.expression_is_true:
                expression: "<= current_timestamp()"
      - name: amount_before_discount_usd
        description: "amount_before_discount_usd cast to decimal currency."
        tests:
          - not_null
          # checks that amount_before_discount_usd is >= amount_after_discount_usd
          - dbt_utils.expression_is_true:
                expression: ">= amount_after_discount_usd"
                config:
                    severity: warn
      - name: amount_after_discount_usd
        description: "amount_after_discount_usd cast to decimal currency."
        tests:
          - not_null
          # ensures total spent is never negative
          - dbt_utils.expression_is_true:
                expression: ">= 0"


  - name: stg_products
    description: "Product catalog with standardized financial metrics."
    columns:
      - name: product_id
        description: "Primary key for the catalog item."
        tests:
          - unique
          - not_null
      - name: price_usd
        description: "Retail shelf price of the product."
        tests:
        # ensures retail price >= product price
          - dbt_utils.expression_is_true:
                expression: ">= cost_usd"
      - name: cost_usd
        description: "Wholesale cost to acquire the product."
        

  - name: stg_reviews
    description: "Standardized customer product review feedback and ratings."
    columns:
      - name: review_id
        description: "Primary key for the individual text review rating."
        tests:
          - unique
          - not_null
      - name: review_rating
        description: "Numerical user score given to the product."
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_sessions
    description: "Cleaned user clickstream session metadata tracking."
    columns:
      - name: session_id
        description: "Primary key tracking the individual session window."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key mapping the session to an authorized customer."
